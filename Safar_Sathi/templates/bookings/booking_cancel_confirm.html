{% extends 'base.html' %}
{% block title %}Cancel Booking — Safar Sathi{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5 text-center">
                <i class="bi bi-x-circle-fill text-danger mb-3" style="font-size:3rem;"></i>
                <h4 class="fw-bold mb-2">Cancel Booking #{{ booking.pk }}?</h4>
                <p class="text-muted mb-4">This action will cancel your reservation. You can make a new booking anytime.</p>
                <form method="post" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Cancel</button>
                    <a href="{% url 'bookings:booking_detail' booking.pk %}" class="btn btn-outline-secondary px-4">Keep Booking</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
