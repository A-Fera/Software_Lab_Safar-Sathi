{% extends 'base.html' %}
{% block title %}Delete Itinerary — Safar Sathi{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger mb-3" style="font-size:3rem;"></i>
                <h4 class="fw-bold mb-2" style="color:var(--text-main);">Delete "{{ itinerary.title }}"?</h4>
                <p class="mb-4" style="color:var(--text-muted);">All activities in this itinerary will be permanently deleted.</p>
                <form method="post" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'itinerary:itinerary_detail' itinerary.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
