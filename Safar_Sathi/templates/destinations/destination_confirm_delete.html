{% extends 'base.html' %}
{% block title %}Delete Destination — Safar Sathi{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5 text-center">
                <i class="bi bi-exclamation-triangle-fill text-danger mb-3" style="font-size:3rem;"></i>
                <h4 class="fw-bold mb-2">Delete "{{ destination.name }}"?</h4>
                <p class="text-muted mb-4">This will permanently delete this destination and all its photos and reviews.</p>
                <form method="post" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'destinations:destination_detail' destination.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
