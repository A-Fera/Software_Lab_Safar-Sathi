{% extends 'base.html' %}
{% block title %}Login — Safar Sathi{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background:linear-gradient(135deg,var(--primary-dark),var(--primary));">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="{% url 'home' %}" style="font-family:'Playfair Display',serif;font-size:2rem;color:#fff;text-decoration:none;">
                        <i class="bi bi-compass me-2"></i>Safar <span style="color:var(--accent)">Sathi</span>
                    </a>
                    <p class="text-white-50 mt-2 small">Welcome back, traveler!</p>
                </div>
                <div class="card p-4 shadow-lg border-0">
                    <h4 class="fw-bold mb-4 text-center">Sign In</h4>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Your username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-600">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
                    </form>
                    <p class="text-center text-muted mt-4 mb-0 small">Don't have an account? <a href="{% url 'accounts:signup' %}" class="fw-600">Sign up free</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
